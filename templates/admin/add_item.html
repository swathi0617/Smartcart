<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f4f6f9;
        }

        .header{
            background:linear-gradient(90deg,#4facfe,#00c6ff);
            color:white;
            padding:15px 20px;
        }

        .header h2{
            margin:0;
        }

        .container{
            display:flex;
            justify-content:center;
            padding:30px;
        }

        .form-box{
            background:white;
            width:460px;
            padding:25px;
            border-radius:12px;
            box-shadow:0 6px 18px rgba(0,0,0,0.1);
        }

        .form-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        label{
            font-size:14px;
            color:#444;
            font-weight:bold;
        }

        input,textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
            box-sizing:border-box;
        }

        input:focus,textarea:focus{
            border-color:#4facfe;
            box-shadow:0 0 5px rgba(79,172,254,0.4);
        }

        textarea{
            resize:none;
            height:80px;
        }

        .hint{
            font-size:12px;
            color:#64748b;
            margin-top:-10px;
            margin-bottom:12px;
        }

        button{
            width:100%;
            padding:11px;
            background:#4facfe;
            border:none;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#00c6ff;
        }

        .msg{
            text-align:center;
            color:green;
            margin-bottom:10px;
        }

        .back{
            display:block;
            text-align:center;
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Add New Product</h2>
</div>

<div class="container">

<div class="form-box">

<h2>Product Details</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <p class="msg">{{ message }}</p>
  {% endfor %}
{% endwith %}

<form method="POST" action="/admin/add-item" enctype="multipart/form-data">

    <label>Product Name:</label>
    <input type="text" name="name" required>

    <label>Description:</label>
    <textarea name="description" required></textarea>

    <label>Category:</label>
    <input type="text" name="category" required>

    <label>Original Price:</label>
    <input type="number" step="0.01" name="original_price" required>
    <p class="hint">Example: ₹1000</p>

    <label>Discount Percentage:</label>
    <input type="number" name="discount_percent" min="0" max="100" value="0" required>
    <p class="hint">Example: 20 = 20% OFF</p>

    <!-- PRICE AUTO CALCULATE AVTUNDI -->
    <!-- Coins AUTO CALCULATE AVTAI -->

    <label>Product Image:</label>
    <input type="file" name="image" accept="image/*" required>

    <button type="submit">Add Product</button>
    <br><br>

    <a class="back" href="/admin-dashboard">← Back To Dashboard</a>

</form>

</div>
</div>

</body>
</html>
