<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:#fff;
            width:360px;
            padding:25px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        label{
            display:block;
            margin-top:10px;
            font-size:14px;
            color:#444;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:6px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:10px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#00c6ff;
        }

        .msg{
            text-align:center;
            color:green;
            font-size:14px;
        }

        a{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <p class="msg">{{ msg }}</p>
      {% endfor %}
    {% endwith %}

    <form method="POST">
    <input type="email" name="email" placeholder="Enter Email" required>
    <button type="submit">Send Reset Link</button>
</form>
    <a href="/">Back to Login</a>
</div>

</body>
</html>
