<!DOCTYPE html>
<html>
<head>
    <title>Admin Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* Header */
        .header {
            background: linear-gradient(90deg, #4facfe, #00c6ff);
            color: white;
            padding: 15px 20px;
        }

        .header h2 {
            margin: 0;
        }

        /* Container */
        .container {
            display: flex;
            justify-content: center;
            padding: 30px;
        }

        /* Card */
        .card {
            background: white;
            width: 420px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Profile Image */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4facfe;
            margin-bottom: 15px;
        }

        /* Inputs */
        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.4);
        }

        /* Button */
        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        /* Flash message */
        .msg {
            color: green;
            margin-bottom: 10px;
        }

        /* Back link */
        .back {
            display: inline-block;
            margin-top: 15px;
            color: #4facfe;
            text-decoration: none;
        }

    </style>

</head>
<body>

<!-- Header -->
<div class="header">
    <h2>Admin Profile</h2>
</div>

<div class="container">

    <div class="card">

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <p class="msg">{{ message }}</p>
          {% endfor %}
        {% endwith %}

        <!-- Profile Image -->
        {% if admin.profile_image %}
            <img src="/static/uploads/admin_profiles/{{ admin.profile_image }}" 
                 class="profile-img">
        {% else %}
            <img src="/static/default.png" class="profile-img">
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/admin/profile" enctype="multipart/form-data">

            <label>Name:</label>
            <input type="text" name="name" value="{{ admin.name }}" required>

            <label>Email:</label>
            <input type="email" name="email" value="{{ admin.email }}" required>

            <label>New Password (optional):</label>
            <input type="password" name="password">

            <label>Upload New Profile Image:</label>
            <input type="file" name="profile_image" accept="image/*">

            <button type="submit">Update Profile</button>

        </form>

        <a class="back" href="/admin-dashboard">← Back to Dashboard</a>

    </div>

</div>

</body>
</html>
