<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:#f4f7fb;
}

/* Navbar */
.navbar{
    background:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1e3a8a;
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:#1e3a8a;
    font-weight:bold;
}

/* Main */
.main{
    flex:1;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 15px;
}

/* Card */
.card{
    width:100%;
    max-width:420px;
    background:white;
    padding:30px 25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.card h2{
    text-align:center;
    margin-bottom:20px;
    color:#111827;
}

/* Flash */
.flash{
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}

.flash.success{
    background:#dcfce7;
    color:#166534;
}

.flash.danger{
    background:#fee2e2;
    color:#991b1b;
}

/* Form */
label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    margin-bottom:15px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.95;
}

/* Footer */
.footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:15px;
}

/* Responsive */
@media(max-width:768px){
    .navbar{
        flex-direction:column;
        gap:10px;
    }

    .nav-links{
        flex-wrap:wrap;
        justify-content:center;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">SmartCart</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin-login">Admin Login</a>
        <a href="/admin-signup">Register</a>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="card">

        <h2>Verify OTP</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/verify-otp">

            <label>Enter OTP</label>
            <input type="text" name="otp" placeholder="Enter OTP" required>

            <label>Create Password</label>
            <input type="password" name="password" placeholder="Create password" required>

            <button type="submit">Verify & Register</button>
        </form>

    </div>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 SmartCart. All Rights Reserved.
</div>

</body>
</html>
