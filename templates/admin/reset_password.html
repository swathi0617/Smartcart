<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
}

/* NAVBAR */
.navbar{
    width:100%;
    background:#f8fbff;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:30px;
    font-weight:800;
    color:#123c91;
}

.logo-icon{
    font-size:26px;
}

.nav-links{
    display:flex;
    gap:42px;
}

.nav-links a{
    text-decoration:none;
    color:#0f3278;
    font-weight:700;
    font-size:16px;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:45px 20px;
}

.box{
    width:100%;
    max-width:430px;
    background:#fff;
    padding:36px 32px;
    border-radius:22px;
    box-shadow:0 20px 45px rgba(0,0,0,0.22);
    text-align:center;
}

h2{
    font-size:30px;
    color:#07152c;
    margin-bottom:22px;
}

label{
    display:block;
    text-align:left;
    margin:16px 0 8px;
    font-size:15px;
    font-weight:700;
    color:#111827;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,0.16);
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1e40af,#2563eb);
    color:white;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
}

button:hover{
    transform:translateY(-1px);
}

.msg{
    margin-bottom:12px;
    padding:12px;
    border-radius:10px;
    background:#dcfce7;
    color:#166534;
    font-weight:700;
    font-size:14px;
}

/* FOOTER */
.footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:18px 10px;
    font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .navbar{
        padding:16px 22px;
        flex-direction:column;
        gap:15px;
    }

    .logo{
        font-size:28px;
    }

    .nav-links{
        gap:22px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .box{
        max-width:400px;
        padding:30px 24px;
    }

    h2{
        font-size:26px;
    }
}

@media(max-width:480px){
    .main{
        padding:30px 15px;
    }

    .logo{
        font-size:24px;
    }

    .nav-links a{
        font-size:14px;
    }

    .box{
        padding:28px 20px;
        border-radius:18px;
    }

    h2{
        font-size:24px;
    }

    button{
        font-size:16px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <span class="logo-icon">🛒</span>
        <span>SmartCart</span>
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin-login">Admin Login</a>
        <a href="/admin-signup">Register</a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="box">

        <h2>Reset Password</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <p class="msg">{{ msg }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">

            <label>New Password</label>
            <input type="password" name="password" placeholder="Enter new password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>

            <button type="submit">Update Password</button>

        </form>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 SmartCart. All Rights Reserved.
</div>

</body>
</html>
