<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Layout fix */
body{
    background:#f4f7fb;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Navbar */
.navbar{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:15px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    padding:8px 12px;
    border-radius:6px;
}

.nav-links a:hover{
    background:rgba(255,255,255,0.2);
}

.menu-toggle{
    display:none;
    font-size:26px;
    cursor:pointer;
}

/* Container */
.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* 🔥 Card always mobile style */
.card{
    background:white;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding:25px;
    max-width:420px;
    width:100%;
}

.card img{
    width:100%;
    height:240px;
    object-fit:contain;
    background:#eef3ff;
    border-radius:14px;
    padding:10px;
}

/* Details */
.details{
    width:100%;
    text-align:left;
}

.details h2{
    color:#1e3a8a;
    margin-bottom:10px;
}

.details p{
    margin:8px 0;
}

.price{
    font-size:22px;
    color:#16a34a;
    font-weight:bold;
}

/* Buttons */
.btns{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:10px 14px;
    border-radius:8px;
    color:white;
    font-weight:bold;
}

.back{ background:#111827; }
.edit{ background:#2563eb; }
.delete{ background:#dc2626; }

/* Footer */
.footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:auto;
}

/* Mobile menu */
@media(max-width:768px){

    .menu-toggle{
        display:block;
    }

    .nav-links{
        display:none;
        flex-direction:column;
        width:100%;
        background:#1e40af;
        margin-top:10px;
        border-radius:10px;
    }

    .nav-links.show{
        display:flex;
    }

    .nav-links a{
        padding:12px;
        border-bottom:1px solid rgba(255,255,255,0.2);
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">SmartCart</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="navLinks">
        <a href="/admin-dashboard">Dashboard</a>
        <a href="/admin/add-item">Add Product</a>
        <a href="/admin/item-list">Products</a>
        <a href="/admin/logout">Logout</a>
    </div>
</div>

<!-- Content -->
<div class="container">

    <div class="card">

        <img src="/static/uploads/product_images/{{ product.image }}">

        <div class="details">
            <h2>{{ product.name }}</h2>

            <p><strong>Description:</strong> {{ product.description }}</p>
            <p><strong>Category:</strong> {{ product.category }}</p>

            <p class="price">₹{{ product.price }}</p>

            <div class="btns">
                <a href="/admin/item-list" class="btn back">Back</a>
                <a href="/admin/update-item/{{ product.product_id }}" class="btn edit">Edit</a>
                <a href="/admin/delete-item/{{ product.product_id }}" class="btn delete">Delete</a>
            </div>
        </div>

    </div>

</div>

<!-- Footer -->
<div class="footer">
    © 2026 SmartCart | All Rights Reserved
</div>

<script>
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
