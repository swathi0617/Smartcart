<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - SmartCart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    display:flex;
    flex-direction:column;
}

/* NAVBAR */
.navbar{
    width:100%;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(135deg,#ffffff,#eff6ff);
    box-shadow:0 4px 15px rgba(0,0,0,0.12);
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:2px solid rgba(37,99,235,0.12);
}

.logo{
    font-size:28px;
    font-weight:800;
    color:#1e3a8a;
    display:flex;
    align-items:center;
    gap:10px;
}

.logo span{
    font-size:30px;
}

.nav-links{
    display:flex;
    gap:22px;
}

.nav-links a{
    text-decoration:none;
    color:#1e3a8a;
    font-weight:700;
    font-size:15px;
    padding:8px 14px;
    border-radius:8px;
    transition:0.3s;
}

.nav-links a:hover{
    background:#2563eb;
    color:#fff;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.login-box{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:35px 30px;
    border-radius:24px;
    box-shadow:0 18px 45px rgba(0,0,0,0.25);
}

.login-box h2{
    text-align:center;
    color:#111827;
    margin-bottom:25px;
    font-size:32px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#374151;
    font-size:16px;
    font-weight:700;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    margin-bottom:18px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.15);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(37,99,235,0.30);
}

.links{
    margin-top:18px;
    text-align:center;
    font-size:15px;
}

.links a{
    text-decoration:none;
    color:#2563eb;
    font-weight:700;
}

.links a:hover{
    text-decoration:underline;
}

/* FLASH */
.flash{
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:600;
    font-size:14px;
}

.flash.success{
    background:#dcfce7;
    color:#166534;
}

.flash.danger{
    background:#fee2e2;
    color:#991b1b;
}

.flash.warning{
    background:#fef3c7;
    color:#92400e;
}

/* FOOTER */
.footer{
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:16px 10px;
    font-size:14px;
}

/* TABLET */
@media(max-width:768px){

.navbar{
    padding:14px 5%;
}

.logo{
    font-size:24px;
}

.nav-links{
    gap:10px;
}

.nav-links a{
    font-size:14px;
    padding:8px 10px;
}

.login-box{
    max-width:420px;
    padding:30px 25px;
}

}

/* MOBILE */
@media(max-width:480px){

.navbar{
    flex-direction:column;
    gap:12px;
}

.logo{
    font-size:24px;
}

.nav-links{
    width:100%;
    justify-content:center;
    flex-wrap:wrap;
}

.main{
    padding:30px 15px;
    align-items:flex-start;
}

.login-box{
    margin-top:10px;
    padding:28px 22px;
    border-radius:20px;
}

.login-box h2{
    font-size:28px;
}

input,
button{
    font-size:15px;
}

.links{
    font-size:14px;
    line-height:24px;
}

}

</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <span>🛒</span> SmartCart
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin-signup">Register</a>
    </div>
</nav>

<div class="main">

    <div class="login-box">

        <h2>Admin Login</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/admin-login">

            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter admin email" required>

            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button type="submit">Login</button>

        </form>

        <div class="links">
            <a href="/forgot-password">Forgot Password?</a> |
            <a href="/admin-signup">Create Account</a>
        </div>

    </div>

</div>

<footer class="footer">
    © 2026 SmartCart. All Rights Reserved.
</footer>

</body>
</html>
