<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:#f4f7fb;
}

/* Navbar */
.navbar{
    width:100%;
    background:#1f2937;
    color:white;
    padding:16px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:16px;
}

.nav-links a:hover{
    color:#60a5fa;
}

/* Main */
.main{
    min-height:calc(100vh - 140px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    background:linear-gradient(135deg,#eef2ff,#dbeafe);
}

.box{
    width:100%;
    max-width:430px;
    background:white;
    padding:35px 30px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#1f2937;
    font-size:30px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:16px;
    margin-bottom:18px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

.back-link a:hover{
    text-decoration:underline;
}

.flash-msg{
    margin-bottom:15px;
}

.flash-msg p{
    padding:10px;
    border-radius:8px;
    background:#fee2e2;
    color:#991b1b;
    text-align:center;
}

/* Footer */
.footer{
    background:#1f2937;
    color:white;
    text-align:center;
    padding:18px;
    font-size:15px;
}

/* Mobile */
@media(max-width:600px){
    .navbar{
        flex-direction:column;
        gap:10px;
        padding:15px;
    }

    .nav-links a{
        margin:0 8px;
        font-size:14px;
    }

    .box{
        padding:30px 22px;
    }

    h2{
        font-size:26px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">SmartCart</div>
    <div class="nav-links">
        <a href="/user-home">Home</a>
        <a href="/user-login">Login</a>
        <a href="/user-signup">Signup</a>
    </div>
</nav>

<section class="main">
    <div class="box">
        <h2>Forgot Password</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-msg">
            {% for category, message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/forgot-password">
            <input type="email" name="email" placeholder="Enter Email" required>
            <button type="submit">Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="/user-login">Back to Login</a>
        </div>
    </div>
</section>

<footer class="footer">
    <p>&copy; 2026 SmartCart. All Rights Reserved.</p>
</footer>

</body>
</html>
